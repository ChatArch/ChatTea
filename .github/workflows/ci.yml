name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,docs]"
      - run: python -m pytest -q
      - name: Download ChatArch Gitea 1.0.0
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/chattea-gitea"
          cd "$RUNNER_TEMP/chattea-gitea"
          curl -fsSLO https://github.com/ChatArch/gitea/releases/download/v1.0.0/gitea-1.0.0-linux-amd64.xz
          curl -fsSLO https://github.com/ChatArch/gitea/releases/download/v1.0.0/gitea-1.0.0-linux-amd64.xz.sha256
          sha256sum -c gitea-1.0.0-linux-amd64.xz.sha256
          xz -d -c gitea-1.0.0-linux-amd64.xz > gitea
          chmod +x gitea
          ./gitea --version
      - name: Run real Gitea Project API integration smoke
        env:
          CHATARCH_HOME: ${{ runner.temp }}/chatarch
          CHATTEA_TEST_BASE_URL: http://127.0.0.1:13001
          CHATTEA_TEST_OWNER: gitea_admin
        run: |
          set -euo pipefail
          GITEA="$RUNNER_TEMP/chattea-gitea/gitea"
          WORK="$RUNNER_TEMP/chattea-gitea/work"
          CONFIG="$WORK/custom/conf/app.ini"
          python -m chattea.cli server init \
            --binary "$GITEA" \
            --work-path "$WORK" \
            --config "$CONFIG" \
            --base-url "$CHATTEA_TEST_BASE_URL" \
            --listen-addr 127.0.0.1 \
            --http-port 13001 \
            --run-user "$(whoami)" \
            --force \
            -I
          "$GITEA" --config "$CONFIG" --work-path "$WORK" admin user create \
            --username gitea_admin \
            --password chattea-ci-password \
            --email gitea-admin@example.invalid \
            --admin \
            --must-change-password=false
          CHATTEA_TEST_TOKEN=$("$GITEA" --config "$CONFIG" --work-path "$WORK" admin user generate-access-token \
            --username gitea_admin \
            --token-name chattea-ci \
            --raw \
            --scopes all)
          export CHATTEA_TEST_TOKEN
          "$GITEA" web --config "$CONFIG" --work-path "$WORK" --port 13001 > "$RUNNER_TEMP/chattea-gitea/gitea.log" 2>&1 &
          GITEA_PID=$!
          trap 'kill "$GITEA_PID" 2>/dev/null || true; tail -200 "$RUNNER_TEMP/chattea-gitea/gitea.log" || true' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS "$CHATTEA_TEST_BASE_URL/api/v1/version" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "$CHATTEA_TEST_BASE_URL/api/v1/version" >/dev/null
          CHATTEA_INTEGRATION=1 python -m pytest -q tests/test_project_integration.py
      - run: python -m build
      - run: mkdocs build --strict
