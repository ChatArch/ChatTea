<text x="104" y="34" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="15">Release command returns a clean Gitea API error on empty repos</text>
<text x="26" y="64" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea release create --repo smoke/cli-demo --tag v0.1.0 --name &quot;Local smoke release&quot;</text>
<text x="26" y="88" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="15">Error: Gitea API error (422) for /repos/smoke/cli-demo/releases: repo is empty</text>
<text x="26" y="112" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ # This confirms the CLI reports API failures cleanly without a Python traceback.</text>
</svg>