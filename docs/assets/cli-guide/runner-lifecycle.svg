<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="474" viewBox="0 0 1180 474">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/></linearGradient></defs>
<rect width="1180" height="474" rx="18" fill="url(#bg)"/>
<circle cx="28" cy="28" r="7" fill="#ef4444"/><circle cx="52" cy="28" r="7" fill="#f59e0b"/><circle cx="76" cy="28" r="7" fill="#10b981"/>
<text x="104" y="34" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="15">Runner setup and maintenance flow</text>
<text x="26" y="64" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea server config set --section actions --key ENABLED --value true -I</text>
<text x="26" y="88" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">updated: ~/.chatarch/chattea/gitea/custom/conf/app.ini</text>
<text x="26" y="112" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea server restart &amp;&amp; chattea server health</text>
<text x="26" y="136" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">ok: http://127.0.0.1:3000 (1.0.0)</text>
<text x="26" y="160" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea runner setup install --force</text>
<text x="26" y="184" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">installed: ~/.chatarch/chattea/runner/bin/gitea-runner</text>
<text x="26" y="208" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea runner setup register --scope repo --repo gitea_admin/web-docs-smoke --name chattea-runner-web-docs-smoke --labels ubuntu-latest:host</text>
<text x="26" y="232" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">registered: ~/.chatarch/chattea/runner/.runner</text>
<text x="26" y="256" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea runner setup start</text>
<text x="26" y="280" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">started: chattea-runner.service</text>
<text x="26" y="304" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea runner list --scope repo --repo gitea_admin/web-docs-smoke</text>
<text x="26" y="328" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">3   chattea-runner-web-docs-smoke   online   false</text>
<text x="26" y="352" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea runner setup status</text>
<text x="26" y="376" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">Active: active (running)</text>
<text x="26" y="400" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">$ chattea runner setup logs --lines 20</text>
<text x="26" y="424" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">runner: chattea-runner-web-docs-smoke, with labels: [ubuntu-latest], declare successfully</text>
</svg>