site_name: ChatTea 文档
site_url: https://arch.gh.wzhecnu.cn/ChatTea/
repo_url: https://github.com/ChatArch/ChatTea
repo_name: ChatArch/ChatTea
edit_uri: edit/main/docs/
docs_dir: docs/
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
          site_name: ChatTea 文档
        - locale: en
          name: English
          build: true
          site_name: ChatTea Documentation
          nav_translations:
            首页: Home
            入门: Getting Started
            从零开始快速开始: From Scratch
            Gitea 端到端快速开始: Gitea End-to-End
            Gitea 服务: Gitea Service
            服务运维: Service Operations
            本地运行时统一入口: Local Runtime Entry
            运行时文件系统与服务边界: Runtime Filesystem and Service Boundaries
            Pages 机制与静态站点发布: Pages and Static Site Publishing
            Git-backed Pages 分支部署: Git-backed Pages Branch Deploy
            MySQL 后端迁移: MySQL Backend Migration
            账号、组织与可见性模型: Accounts, Organizations, and Visibility
            权限与可见性: Permissions and Visibility
            仓库协作: Repository Collaboration
            仓库协作快速开始: Repository Collaboration Quickstart
            Bot / 服务账号: Bot / Service Accounts
            机器人账号与服务账号: Bot and Service Accounts
            组织任务账号协作闭环: Organization Task Account Flow
            Actions: Actions
            Actions / Flow（动作 / 流程）快速开始: Actions / Flow Quickstart
            Runner: Runner
            Runner 运行环境与多实例: Runner Environment and Multi-Instance
            Runner 多实例第一版方案: Runner Multi-Instance Plan
            CLI / 接口: CLI / API
            CLI 实战指南: CLI Guide
            CLI 能力地图: CLI Capability Map
            官方 tea CLI 对比: Official tea CLI Comparison
            接口树: Interface Tree
            CLI 对齐计划: CLI Alignment Plan
extra:
  alternate:
    - name: 中文
      link: /ChatTea/
      lang: zh
    - name: English
      link: /ChatTea/en/
      lang: en
nav:
  - 首页: index.md
  - 入门:
      - 从零开始快速开始: from-scratch-quickstart.md
      - Gitea 端到端快速开始: gitea-quickstart.md
  - Gitea 服务:
      - 服务运维: gitea-service-operations.md
      - 本地运行时统一入口: local-runtime-entry.md
      - 运行时文件系统与服务边界: runtime-filesystem-layout.md
      - Pages 机制与静态站点发布: gitea-pages.md
      - Git-backed Pages 分支部署: gitea-pages-branch-deploy.md
      - MySQL 后端迁移: gitea-mysql-migration.md
      - 账号、组织与可见性模型: account-organization-visibility.md
      - 权限与可见性: gitea-permissions-and-visibility.md
  - 仓库协作:
      - 仓库协作快速开始: repo-collaboration-quickstart.md
  - Bot / 服务账号:
      - 机器人账号与服务账号: bot-service-account-plan.md
      - 组织任务账号协作闭环: org-task-account-practice.md
  - Actions:
      - Actions / Flow（动作 / 流程）快速开始: actions-flow-quickstart.md
  - Runner:
      - Runner 运行环境与多实例: runner-environment-and-registration.md
      - Runner 多实例第一版方案: runner-multi-instance-plan.md
  - CLI / 接口:
      - CLI 实战指南: cli-guide.md
      - CLI 能力地图: chattea-cli-tree.md
      - 官方 tea CLI 对比: tea-cli-comparison.md
      - 接口树: interface-tree.md
      - CLI 对齐计划: cli-alignment.md
